<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NIL Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=Tourney:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --midnight: #000;
    --white: #fff;
    --tx1: rgba(255,255,255,.92);
    --tx2: rgba(255,255,255,.45);
    --tx3: rgba(255,255,255,.28);
    --rule: rgba(165,131,56,.25);
  }
  html, body {
    width: 100%; min-height: 100vh;
    background: var(--midnight);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    color: var(--tx1);
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  .wrap {
    width: 100%;
    max-width: 780px;
    background: #0d0d0d;
    border: .5px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .close-bar {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 10;
  }
  .close-bar button {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,.6);
    border: 1.5px solid rgba(255,255,255,.25);
    color: rgba(255,255,255,.85);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s;
  }
  .close-bar button:hover { background: rgba(0,0,0,.9); }
  .vid-wrap {
    width: 100%;
    background: #000;
    position: relative;
  }
  .vid-wrap video {
    width: 100%;
    display: block;
    max-height: 75vh;
    object-fit: contain;
    background: #000;
  }
  .no-video {
    width: 100%;
    height: 220px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--tx3);
    font-size: 13px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .info {
    padding: 22px 26px 28px;
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--white);
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 14px;
  }
  .name {
    font-family: 'Tourney', sans-serif;
    font-weight: 600;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 4px;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .school {
    font-size: 13px;
    color: var(--tx2);
    margin-bottom: 16px;
    letter-spacing: .03em;
  }
  .divider {
    height: .5px;
    background: var(--rule);
    margin-bottom: 16px;
  }
  .quote {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--tx1);
    font-style: italic;
    margin-bottom: 14px;
  }
  .brand {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: .06em;
    opacity: .85;
  }
  .back {
    margin-top: 18px;
    font-size: 12px;
    color: var(--tx3);
    text-align: center;
    letter-spacing: .06em;
  }
  .back button {
    background: none;
    border: none;
    color: var(--tx2);
    cursor: pointer;
    font-size: 12px;
    letter-spacing: .06em;
    text-decoration: underline;
    font-family: inherit;
  }
  .back button:hover { color: var(--white); }
</style>
</head>
<body>
<div class="wrap">
  <div class="close-bar">
    <button onclick="window.close()" title="Close">×</button>
  </div>
  <div class="vid-wrap" id="vidWrap"></div>
  <div class="info">
    <div class="badge" id="badge"></div>
    <div class="name" id="name"></div>
    <div class="school" id="school"></div>
    <div class="divider"></div>
    <div class="quote" id="quote"></div>
    <div class="brand" id="brand"></div>
  </div>
</div>
<div class="back">
  <button onclick="window.close()">← Back to NIL Impact Report</button>
</div>

<script>
  const p = new URLSearchParams(window.location.search);
  const video  = p.get('v')  || '';
  const athlete= p.get('a')  || '';
  const sport  = p.get('sl') || '';
  const school = p.get('sc') || '';
  const brand  = p.get('b')  || '';
  const quote  = p.get('q')  || '';

  document.title = athlete || 'NIL Story';
  document.getElementById('badge').textContent  = sport;
  document.getElementById('name').textContent   = athlete;
  document.getElementById('school').textContent = school;
  document.getElementById('brand').textContent  = brand ? '× ' + brand : '';
  document.getElementById('quote').textContent  = quote ? '\u201c' + quote + '\u201d' : '';

  const vidWrap = document.getElementById('vidWrap');
  if (video) {
    const vid = document.createElement('video');
    vid.src = video;
    vid.controls = true;
    vid.autoplay = true;
    vid.setAttribute('playsinline', '');
    vidWrap.appendChild(vid);
  } else {
    const empty = document.createElement('div');
    empty.className = 'no-video';
    empty.textContent = 'No video available';
    vidWrap.appendChild(empty);
  }
</script>
</body>
</html>
